name: Database Backup (Odoo + Moodle)
on:
  schedule:
    - cron: '0 2 * * *'  # Every day at 2AM UTC
  workflow_dispatch:       # Allow manual trigger

jobs:
  backup-odoo:
    runs-on: ubuntu-latest
    steps:
      - name: Install pg_dump 17
        run: |
          sudo apt-get install -y gnupg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Dump Odoo database
        run: |
          pg_dump "${{ secrets.ODOO_DB_URL }}" \
            -F plain -f odoo-backup-$(date +%Y%m%d).sql

      - name: Upload Odoo artifact
        uses: actions/upload-artifact@v4
        with:
          name: odoo-backup-${{ github.run_number }}
          path: odoo-backup-*.sql
          retention-days: 90

  backup-moodle:
    runs-on: ubuntu-latest
    steps:
      - name: Install pg_dump 17
        run: |
          sudo apt-get install -y gnupg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Dump Moodle database
        run: |
          pg_dump "${{ secrets.MOODLE_DB_URL }}" \
            -F plain -f moodle-backup-$(date +%Y%m%d).sql

      - name: Upload Moodle artifact
        uses: actions/upload-artifact@v4
        with:
          name: moodle-backup-${{ github.run_number }}
          path: moodle-backup-*.sql
          retention-days: 90
